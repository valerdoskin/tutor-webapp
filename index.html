<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* === CSS переменные === */
        :root {
            --bg-primary: var(--tg-theme-bg-color, #ffffff);
            --bg-secondary: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --bg-chat: var(--tg-theme-bg-color, #ffffff);
            --text-primary: var(--tg-theme-text-color, #000000);
            --text-secondary: var(--tg-theme-hint-color, #888888);
            --accent: var(--tg-theme-button-color, #3390ec);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* === Header === */
        #header {
            padding: 16px 20px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 64px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        #header .title {
            font-weight: 700;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #header .title .level {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 2px 10px;
            border-radius: 20px;
            -webkit-text-fill-color: var(--text-secondary);
        }
        #header .user {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #header .user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(51, 144, 236, 0.3);
        }
        #header .user .name {
            font-weight: 500;
            font-size: 15px;
            color: var(--text-primary);
        }
        /* === Chat === */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-chat);
            scroll-behavior: smooth;
        }
        #chat::-webkit-scrollbar {
            width: 4px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 10px;
        }
        .message {
            max-width: 82%;
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
            animation: slideIn 0.25s ease;
            align-self: flex-start;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
            position: relative;
            transition: all 0.2s;
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: var(--accent-text);
            border-bottom-right-radius: 4px;
        }
        .message .text {
            font-size: 15px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
        .message.user .time {
            color: rgba(255,255,255,0.7);
        }
        .message .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: absolute;
            bottom: -8px;
            left: -8px;
            border: 2px solid var(--bg-primary);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .message.user .avatar {
            display: none;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            gap: 4px;
            box-shadow: var(--shadow);
        }
        .typing-indicator.active {
            display: flex;
            align-items: center;
        }
        .typing-indicator .dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            margin: 0 2px;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }
        /* === Input area === */
        #input-area {
            display: flex;
            padding: 10px 16px;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: var(--bg-primary);
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #message-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1.5px solid var(--text-secondary);
            outline: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            height: 48px;
        }
        #message-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(51, 144, 236, 0.15);
        }
        #send-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            height: 48px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(51, 144, 236, 0.25);
        }
        #send-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        #voice-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1.5px solid var(--text-secondary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        #voice-btn:active {
            transform: scale(0.9);
        }
        #voice-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            color: white;
        }
        /* === Tabs === */
        #tabs {
            display: flex;
            justify-content: space-around;
            background: var(--bg-secondary);
            padding: 6px 0 8px;
            border-top: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .tab {
            background: none;
            border: none;
            padding: 4px 0;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 500;
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-family: 'Inter', sans-serif;
        }
        .tab .icon {
            font-size: 24px;
            line-height: 1;
        }
        .tab .label {
            font-size: 11px;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        .tab.active {
            color: var(--accent);
        }
        .tab.active .icon {
            transform: scale(1.1);
        }
        .tab-content {
            display: none;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            background: var(--bg-primary);
        }
        .tab-content.active {
            display: block;
        }
        #progress-content, #words-content, #profile-content {
            height: calc(100vh - 160px);
        }
        .placeholder {
            color: var(--text-secondary);
            text-align: center;
            margin-top: 60px;
            font-size: 16px;
            line-height: 1.8;
        }
        .placeholder .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        /* === Recording indicator === */
        #recording-indicator {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #recording-indicator .pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ff3b30;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.7; }
        }
        /* === Responsive === */
        @media (max-width: 480px) {
            #header .title { font-size: 20px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">
            AI Tutor
            <span class="level" id="user-level">A2</span>
        </div>
        <div class="user">
            <span class="name" id="user-name">Valeriy</span>
            <div class="avatar">V</div>
        </div>
    </div>

    <div id="chat">
        <div class="message bot">
            <div class="text">👋 Привет! Я твой AI-тьютор.<br>Напиши что-нибудь или запиши голосовое.</div>
            <span class="time">только что</span>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <span>Печатает</span>
            <span class="dots">
                <span></span><span></span><span></span>
            </span>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="Напишите сообщение..." />
        <button id="send-btn">Отправить</button>
        <button id="voice-btn" aria-label="Голосовое сообщение">🎤</button>
    </div>

    <div id="tabs">
        <button class="tab active" data-tab="chat">
            <span class="icon">💬</span>
            <span class="label">Главная</span>
        </button>
        <button class="tab" data-tab="progress">
            <span class="icon">📊</span>
            <span class="label">Прогресс</span>
        </button>
        <button class="tab" data-tab="words">
            <span class="icon">📚</span>
            <span class="label">Слова</span>
        </button>
        <button class="tab" data-tab="profile">
            <span class="icon">👤</span>
            <span class="label">Профиль</span>
        </button>
    </div>

    <div id="progress-content" class="tab-content">
        <div class="placeholder">
            <span class="big-icon">📊</span>
            Ваш прогресс появится здесь
        </div>
    </div>
    <div id="words-content" class="tab-content">
        <div class="placeholder">
            <span class="big-icon">📚</span>
            Ваши слова будут отображаться здесь
        </div>
    </div>
    <div id="profile-content" class="tab-content">
        <div class="placeholder">
            <span class="big-icon">👤</span>
            Информация о профиле
        </div>
    </div>

    <div id="recording-indicator">
        <span class="pulse"></span> Запись...
    </div>

    <script>
        // Конфигурация
        const BOT_TOKEN = '8845798286:AAFIfOcm5DIeuIxlk2IxQFUp7O4X6WyT1ag';
        const CHAT_ID = 200916160; // замените на ваш ID или используйте динамический

        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        const user = tg.initDataUnsafe?.user;
        const chatId = user?.id || CHAT_ID;

        // DOM элементы
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const tabs = document.querySelectorAll('.tab');
        const contents = {
            chat: document.getElementById('chat'),
            progress: document.getElementById('progress-content'),
            words: document.getElementById('words-content'),
            profile: document.getElementById('profile-content')
        };
        const recordingIndicator = document.getElementById('recording-indicator');

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let lastUpdateId = 0;

        // Функции
        function addMessage(text, isUser, time) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.innerHTML = text; // поддерживает простые теги
            msg.appendChild(textDiv);
            const timeEl = document.createElement('span');
            timeEl.className = 'time';
            timeEl.textContent = time || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            msg.appendChild(timeEl);
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.classList.toggle('active', show);
        }

        async function sendMessageToBot(text) {
            if (!text.trim()) return;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams({ chat_id: chatId, text: text });
            try {
                showTyping(true);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const data = await response.json();
                showTyping(false);
                if (data.ok) {
                    addMessage(text, true);
                } else {
                    console.error('Ошибка отправки:', data.description);
                }
            } catch (e) {
                showTyping(false);
                console.error('Сетевая ошибка:', e);
            }
        }

        async function sendVoiceToBot(audioBlob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('voice', audioBlob, 'voice.webm');
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.ok) {
                    addMessage('🎤 Голосовое сообщение', true);
                } else {
                    console.error('Ошибка отправки голоса:', data.description);
                }
            } catch (e) {
                console.error('Сетевая ошибка:', e);
            }
        }

        async function fetchUpdates() {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=20`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        const message = update.message;
                        if (message && message.chat && message.chat.id == chatId) {
                            if (message.text) {
                                addMessage(message.text, false);
                            } else if (message.voice) {
                                addMessage('🔊 Голосовое от бота', false);
                            }
                        }
                    }
                }
            } catch (e) {
                // тихо игнорируем
            }
        }

        setInterval(fetchUpdates, 2000);

        // Обработчики
        sendBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                sendMessageToBot(text);
                input.value = '';
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Голосовая запись
        voiceBtn.addEventListener('mousedown', startRecording);
        voiceBtn.addEventListener('mouseup', stopRecording);
        voiceBtn.addEventListener('mouseleave', stopRecording);
        voiceBtn.addEventListener('touchstart', startRecording);
        voiceBtn.addEventListener('touchend', stopRecording);
        voiceBtn.addEventListener('touchcancel', stopRecording);

        async function startRecording(e) {
            e.preventDefault();
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendVoiceToBot(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                recordingIndicator.style.display = 'block';
            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                alert('Не удалось получить доступ к микрофону. Разрешите доступ в настройках браузера.');
            }
        }

        function stopRecording(e) {
            e.preventDefault();
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                recordingIndicator.style.display = 'none';
            }
        }

        // Вкладки
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                Object.keys(contents).forEach(key => {
                    if (key === target) {
                        contents[key].style.display = 'flex';
                        contents[key].classList.add('active');
                    } else {
                        contents[key].style.display = 'none';
                        contents[key].classList.remove('active');
                    }
                });
                document.getElementById('input-area').style.display = (target === 'chat') ? 'flex' : 'none';
            });
        });

        // При открытии отправляем /start
        sendMessageToBot('/start');

        console.log('Mini App запущен');
    </script>
</body>
</html>
