<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 0;
        }
        #header {
            padding: 12px 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        #header span {
            display: flex;
            align-items: center;
        }
        #header .level {
            font-size: 14px;
            font-weight: 400;
            color: var(--tg-theme-hint-color, #888888);
            margin-left: 8px;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            align-self: flex-start;
            background: var(--tg-theme-secondary-bg-color, #e9e9e9);
            color: var(--tg-theme-text-color, #000000);
            border-bottom-left-radius: 4px;
        }
        .message.user {
            align-self: flex-end;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-bottom-right-radius: 4px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #input-area {
            display: flex;
            padding: 10px 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            background: var(--tg-theme-bg-color, #ffffff);
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            outline: none;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
        }
        #message-input:focus {
            border-color: var(--tg-theme-button-color, #3390ec);
        }
        #send-btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #send-btn:active {
            opacity: 0.7;
        }
        #voice-btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        #voice-btn:active {
            transform: scale(0.9);
        }
        #voice-btn.recording {
            background: #ff3b30;
        }
        #tabs {
            display: flex;
            justify-content: space-around;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 6px 0;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            flex-shrink: 0;
        }
        .tab {
            background: none;
            border: none;
            font-size: 14px;
            padding: 8px 12px;
            color: var(--tg-theme-hint-color, #888888);
            cursor: pointer;
            transition: color 0.2s, border-bottom 0.2s;
            font-weight: 500;
            flex: 1;
            text-align: center;
        }
        .tab.active {
            color: var(--tg-theme-button-color, #3390ec);
            border-bottom: 2px solid var(--tg-theme-button-color, #3390ec);
        }
        .tab-content {
            display: none;
            padding: 16px;
            overflow-y: auto;
            flex: 1;
            background: var(--tg-theme-bg-color, #ffffff);
        }
        .tab-content.active {
            display: block;
        }
        #progress-content, #words-content, #profile-content {
            height: calc(100vh - 130px);
        }
        .placeholder {
            color: var(--tg-theme-hint-color, #888888);
            text-align: center;
            margin-top: 40px;
            font-size: 16px;
        }
        #recording-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="header">
        <span>
            AI Tutor
            <span class="level" id="user-level">A2</span>
        </span>
        <span id="user-name">Valeriy</span>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="Напишите сообщение..." />
        <button id="send-btn">Отправить</button>
        <button id="voice-btn">🎤</button>
    </div>

    <div id="tabs">
        <button class="tab active" data-tab="chat">Главная</button>
        <button class="tab" data-tab="progress">Прогресс</button>
        <button class="tab" data-tab="words">Слова</button>
        <button class="tab" data-tab="profile">Профиль</button>
    </div>

    <div id="progress-content" class="tab-content">
        <div class="placeholder">Здесь будет ваш прогресс</div>
    </div>
    <div id="words-content" class="tab-content">
        <div class="placeholder">Ваши слова появятся здесь</div>
    </div>
    <div id="profile-content" class="tab-content">
        <div class="placeholder">Информация о профиле</div>
    </div>

    <div id="recording-indicator">🎙️ Запись...</div>

    <script>
        // Конфигурация
        const BOT_TOKEN = '8845798286:AAFIfOcm5DIeuIxlk2IxQFUp7O4X6WyT1ag';
        const BOT_USERNAME = 'english_tutorAI';
        const CHAT_ID = 200916160; // ваш ID, можно получить через tg.initDataUnsafe?.user?.id

        // Получаем chat_id из Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        const user = tg.initDataUnsafe?.user;
        const chatId = user?.id || CHAT_ID;

        // Элементы
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const tabs = document.querySelectorAll('.tab');
        const contents = {
            chat: document.getElementById('chat'),
            progress: document.getElementById('progress-content'),
            words: document.getElementById('words-content'),
            profile: document.getElementById('profile-content')
        };
        const recordingIndicator = document.getElementById('recording-indicator');

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // Добавление сообщения в чат
        function addMessage(text, isUser, time) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.textContent = text;
            const timeEl = document.createElement('span');
            timeEl.className = 'time';
            timeEl.textContent = time || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            msg.appendChild(timeEl);
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        // Отправка текстового сообщения через Bot API
        async function sendMessageToBot(text) {
            if (!text.trim()) return;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams({
                chat_id: chatId,
                text: text
            });
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const data = await response.json();
                if (data.ok) {
                    addMessage(text, true);
                } else {
                    console.error('Ошибка отправки:', data.description);
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
            }
        }

        // Отправка голосового сообщения (аудиофайл)
        async function sendVoiceToBot(audioBlob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('voice', audioBlob, 'voice.ogg');
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.ok) {
                    addMessage('🎤 Голосовое сообщение', true);
                } else {
                    console.error('Ошибка отправки голоса:', data.description);
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
            }
        }

        // Получение обновлений (polling)
        let lastUpdateId = 0;
        async function fetchUpdates() {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        const message = update.message;
                        if (message && message.chat && message.chat.id == chatId) {
                            if (message.text) {
                                addMessage(message.text, false);
                            } else if (message.voice) {
                                addMessage('🔊 Голосовое от бота', false);
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Polling error:', e);
            }
        }

        // Запуск polling (каждые 2 секунды)
        setInterval(fetchUpdates, 2000);

        // Обработчики
        sendBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                sendMessageToBot(text);
                input.value = '';
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Голосовая запись
        voiceBtn.addEventListener('mousedown', startRecording);
        voiceBtn.addEventListener('mouseup', stopRecording);
        voiceBtn.addEventListener('mouseleave', stopRecording);
        voiceBtn.addEventListener('touchstart', startRecording);
        voiceBtn.addEventListener('touchend', stopRecording);
        voiceBtn.addEventListener('touchcancel', stopRecording);

        async function startRecording(e) {
            e.preventDefault();
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendVoiceToBot(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                recordingIndicator.style.display = 'block';
            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                alert('Не удалось получить доступ к микрофону. Разрешите доступ в настройках браузера.');
            }
        }

        function stopRecording(e) {
            e.preventDefault();
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                recordingIndicator.style.display = 'none';
            }
        }

        // Переключение вкладок
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                Object.keys(contents).forEach(key => {
                    if (key === target) {
                        contents[key].style.display = 'flex';
                        contents[key].classList.add('active');
                    } else {
                        contents[key].style.display = 'none';
                        contents[key].classList.remove('active');
                    }
                });
                document.getElementById('input-area').style.display = (target === 'chat') ? 'flex' : 'none';
            });
        });

        // При открытии отправляем /start
        sendMessageToBot('/start');

        // Отображаем приветственное сообщение
        addMessage('👋 Привет! Я твой AI-тьютор. Напиши что-нибудь или запиши голосовое.', false);

        console.log('Mini App запущен');
    </script>
</body>
</html>
