<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... ваш стиль ... */
    </style>
</head>
<body>
    <div id="header">
        <span>AI Tutor <span class="level" id="user-level">A2</span></span>
        <span id="user-name">Valeriy</span>
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Напишите сообщение..."/>
        <button id="send-btn">Отправить</button>
    </div>
    <div id="tabs">
        <button class="tab active" data-tab="chat">Главная</button>
        <button class="tab" data-tab="progress">Прогресс</button>
        <button class="tab" data-tab="words">Слова</button>
        <button class="tab" data-tab="profile">Профиль</button>
    </div>
    <div id="progress-content" class="tab-content"><div class="placeholder">Здесь будет ваш прогресс</div></div>
    <div id="words-content" class="tab-content"><div class="placeholder">Ваши слова появятся здесь</div></div>
    <div id="profile-content" class="tab-content"><div class="placeholder">Информация о профиле</div></div>

    <script>
        // Конфигурация
        const BOT_TOKEN = '8845798286:AAFIfOcm5DIeuIxlk2IxQFUp7O4X6WyT1ag';
        const BOT_USERNAME = 'english_tutorAI'; // замените на юзернейм вашего бота

        const tg = window.Telegram.WebApp;
        tg.ready();

        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const tabs = document.querySelectorAll('.tab');
        const contents = {
            chat: document.getElementById('chat'),
            progress: document.getElementById('progress-content'),
            words: document.getElementById('words-content'),
            profile: document.getElementById('profile-content')
        };

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.textContent = text;
            const time = document.createElement('span');
            time.className = 'time';
            time.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            msg.appendChild(time);
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        // Отправка сообщения через Bot API
        async function sendMessageToBot(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams({
                chat_id: tg.initDataUnsafe?.user?.id || 'test', // если WebApp не даёт id, можно использовать test
                text: text
            });
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const data = await response.json();
                if (data.ok) {
                    addMessage(text, true);
                    // Ответ бота придёт в чат Telegram, его мы не можем отобразить здесь без WebSocket
                    // Но пользователь увидит его в основном чате.
                } else {
                    console.error('Ошибка отправки:', data.description);
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                sendMessageToBot(text);
                input.value = '';
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Переключение вкладок
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                Object.keys(contents).forEach(key => {
                    if (key === target) {
                        contents[key].style.display = 'flex';
                        contents[key].classList.add('active');
                    } else {
                        contents[key].style.display = 'none';
                        contents[key].classList.remove('active');
                    }
                });
                document.getElementById('input-area').style.display = (target === 'chat') ? 'flex' : 'none';
            });
        });

        // При открытии отправляем /start
        sendMessageToBot('/start');

        // Кнопка "Открыть чат" (добавьте её в интерфейс, например, в шапку)
        const chatLink = document.createElement('a');
        chatLink.href = `tg://resolve?domain=${BOT_USERNAME}`;
        chatLink.textContent = 'Чат с ботом';
        chatLink.style.cssText = 'position:fixed; bottom:60px; right:20px; background:#3390ec; color:white; padding:10px 16px; border-radius:20px; text-decoration:none; font-weight:bold;';
        document.body.appendChild(chatLink);

        console.log('Mini App запущен');
    </script>
</body>
</html>
